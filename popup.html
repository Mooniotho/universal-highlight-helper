<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Universal Highlight Helper</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
  <div class="top-bar">
    <div class="header-row">
      <h1>Highlights</h1>
      <div class="header-right">
        <select id="sort-select" class="sort-select" title="Sort order">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
          <option value="az">A–Z by title</option>
        </select>
        <button id="btn-settings" class="btn-settings" title="AI Settings">⚙</button>
      </div>
    </div>
    <div id="stats-bar" class="stats-bar"></div>
    <div id="sources-bar" class="sources-bar" style="display:none;">
      <div class="sources-header">
        <span class="sources-title">Top Sources</span>
        <button id="btn-clear-source" class="sources-clear-btn" style="display:none;">Clear filter</button>
      </div>
      <div id="sources-list" class="sources-list"></div>
    </div>
    <div class="search-row">
      <input type="search" id="search" placeholder="Search highlights…" autocomplete="off" spellcheck="false" />
    </div>
    <div class="tag-filter" id="tag-filter">
      <button class="tag-pill active" data-tag="All">All</button>
      <button class="tag-pill tag-pill-starred" data-tag="Starred">★ Starred</button>
      <button class="tag-pill" data-tag="School">School</button>
      <button class="tag-pill" data-tag="Work">Work</button>
      <button class="tag-pill" data-tag="Research">Research</button>
      <button class="tag-pill" data-tag="Personal">Personal</button>
      <button class="tag-pill" data-tag="Other">Other</button>
    </div>
    <div class="toolbar">
      <button id="btn-import-json" class="toolbar-btn">Import</button>
      <button id="btn-export-json" class="toolbar-btn">Export JSON</button>
      <button id="btn-export-csv" class="toolbar-btn">Export CSV</button>
      <button id="btn-clear-all" class="toolbar-btn toolbar-danger">Clear All</button>
    </div>
  </div>
  <main id="highlights-list"></main>
  </div><!-- #app -->
  <div id="toast-container" aria-live="polite"></div>
  <script src="ai-providers.js"></script>
  <script src="ai.js"></script>
  <script src="popup.js"></script>
</body>
</html>
